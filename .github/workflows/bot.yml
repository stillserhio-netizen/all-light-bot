name: Light Bot

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  # 4 паралельних jobs — кожен з різного IP, збирає свої 3 адреси
  collect-0:
    runs-on: ubuntu-latest
    env:
      MODE: collect
      CHUNK: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - run: python bot.py
      - uses: actions/upload-artifact@v4
        with:
          name: chunk-0
          path: chunk_0.json

  collect-1:
    runs-on: ubuntu-latest
    env:
      MODE: collect
      CHUNK: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - run: python bot.py
      - uses: actions/upload-artifact@v4
        with:
          name: chunk-1
          path: chunk_1.json

  collect-2:
    runs-on: ubuntu-latest
    env:
      MODE: collect
      CHUNK: "2"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - run: python bot.py
      - uses: actions/upload-artifact@v4
        with:
          name: chunk-2
          path: chunk_2.json

  collect-3:
    runs-on: ubuntu-latest
    env:
      MODE: collect
      CHUNK: "3"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - run: python bot.py
      - uses: actions/upload-artifact@v4
        with:
          name: chunk-3
          path: chunk_3.json

  # Notify job — чекає всі 4 chunks, формує і надсилає повідомлення
  notify:
    runs-on: ubuntu-latest
    needs: [collect-0, collect-1, collect-2, collect-3]
    permissions:
      contents: write
    env:
      MODE: notify
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests

      - uses: actions/download-artifact@v4
        with:
          name: chunk-0
      - uses: actions/download-artifact@v4
        with:
          name: chunk-1
      - uses: actions/download-artifact@v4
        with:
          name: chunk-2
      - uses: actions/download-artifact@v4
        with:
          name: chunk-3

      - run: python bot.py

      - name: Push state changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f state.txt state_tomorrow.txt reminders.txt 2>/dev/null || true
          git diff --cached --quiet || git commit -m "update state [skip ci]"
          git push
